spring:
  datasource:
    url: jdbc:h2:file:./data/weather;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC

logging:
  level:
    com.example.weather: INFO
